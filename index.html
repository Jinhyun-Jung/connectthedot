<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect Dots</title>
    <!-- Noto Sans CJK KR 웹폰트 추가 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Noto Serif KR 웹폰트 추가 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 로그인 화면 테마 폰트 (hub 테마: Paperlogy + Pretendard) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

    <!-- CSS 파일 링크 -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/ai-mindmap.css">
    <link rel="stylesheet" href="css/three-3d.css">

    <!-- 웹훅 URL 설정 (Make AI 또는 n8n) -->
    <!-- 방법 1: 직접 설정 -->
    <script>
        window.WEBHOOK_URL = 'https://hook.eu1.make.com/7h281ofrhz35ct8v9gsh60vuh7wpahdw';
    </script>

    <!-- 방법 2: localStorage에서 자동 로드 (브라우저 콘솔에서 설정: localStorage.setItem('webhook_url', 'YOUR_URL')) -->
    <script>
        if (localStorage.getItem('webhook_url')) {
            window.WEBHOOK_URL = localStorage.getItem('webhook_url');
        }
    </script>
</head>

<body>
    <div id="starBackground"></div>
    <div id="canvas3d"></div>
    <div id="canvas"></div>

    <!-- 캔버스 탭 시스템 -->
    <div id="canvasTabContainer" class="canvas-tab-container">
        <div class="tab-list">
            <div class="tab-item active" data-canvas-id="canvas1">
                <span class="tab-name">우주1</span>
                <button class="tab-close" onclick="closeCanvasTab('canvas1')" title="탭 닫기">×</button>
            </div>
        </div>
        <button class="tab-add-btn" onclick="addNewCanvasTab()" title="새 캔버스 추가">+</button>
    </div>
    <!-- 기존 버튼들 제거하고 새로운 버튼 그룹 생성 -->
    <div class="right-button-group">
        <button id="view3dToggle" class="active" title="2D로 보기" aria-label="3D 보기 전환">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
        </button>
        <button id="addButton" title="에디터" aria-label="에디터">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
        <button id="aiMindmapButton" title="AI 마인드맵" aria-label="AI 마인드맵">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>
        </button>
        <button id="spreadsheetButton" title="스프레드시트" aria-label="스프레드시트">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M12 3v18"/></svg>
        </button>
        <button class="show-folder-btn" onclick="toggleFolderView()" title="폴더" aria-label="폴더">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        </button>
        <button class="show-calendar-btn" onclick="toggleCalendarView()" title="캘린더" aria-label="캘린더">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        </button>
    </div>
    <div id="editor">
        <button class="editor-close-btn" onclick="closeEditor()" title="닫기" aria-label="닫기">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
        <div class="title-container">
            <input type="text" id="titleInput" placeholder="제목">
            <input type="date" id="dateInput">
        </div>
        <!-- 폴더 입력 컨테이너 수정 -->
        <div class="folder-input-container">
            <div class="folder-path">현재 경로:</div>
            <div class="folder-buttons"></div>
            <div id="newFolderInputContainer" style="display: none;">
                <input type="text" id="newFolderInput" placeholder="새 폴더 이름">
                <div class="folder-button-group">
                    <button onclick="createFolderFromEditor()" class="folder-create-btn">생성</button>
                    <button onclick="hideNewFolderInput()" class="folder-cancel-btn">취소</button>
                </div>
            </div>
        </div>
        <div class="formatting-tools">
            <!-- 텍스트 스타일 그룹 -->
            <div class="format-group">
                <div class="toolbar-group">
                    <button class="toolbar-btn" data-format="bold" title="굵게 (Ctrl+B)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                            <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                        </svg>
                    </button>
                    <button class="toolbar-btn" data-format="italic" title="기울임 (Ctrl+I)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="19" y1="4" x2="10" y2="4"></line>
                            <line x1="14" y1="20" x2="5" y2="20"></line>
                            <line x1="15" y1="4" x2="9" y2="20"></line>
                        </svg>
                    </button>
                    <button class="toolbar-btn" data-format="underline" title="밑줄 (Ctrl+U)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"></path>
                            <line x1="4" y1="21" x2="20" y2="21"></line>
                        </svg>
                    </button>
                    <button class="toolbar-btn" data-format="strikethrough" title="취소선">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <path d="M16 6a6 6 0 0 1 0 12H8a6 6 0 0 1 0-12z"></path>
                        </svg>
                    </button>
                </div>

                <div class="toolbar-separator"></div>

                <!-- 폰트 선택 -->
                <div class="toolbar-select-wrapper">
                    <select class="toolbar-select" id="fontFamily" title="글꼴 선택">
                        <option value="'Noto Sans KR', sans-serif">Noto Sans</option>
                        <option value="'Noto Serif KR', serif">Noto Serif</option>
                        <option value="Gulim, 굴림, sans-serif">굴림</option>
                        <option value="Batang, 바탕, serif">바탕</option>
                    </select>
                </div>

                <div class="toolbar-separator"></div>

                <!-- 폰트 크기 -->
                <div class="toolbar-input-group">
                    <button class="toolbar-btn-icon" id="fontSizeDecrease" title="글자 크기 줄이기">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                    </button>
                    <input type="number" id="fontSize" min="8" max="72" value="12" class="toolbar-input-number" title="글자 크기">
                    <button class="toolbar-btn-icon" id="fontSizeIncrease" title="글자 크기 늘리기">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="16"></line>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="toolbar-separator-vertical"></div>

            <!-- 색상 및 정렬 그룹 -->
            <div class="format-group">
                <!-- 글자색 선택 -->
                <div class="toolbar-color-wrapper">
                    <button class="toolbar-color-btn" id="textColorBtn" title="글자색">
                        <span class="color-letter">A</span>
                        <span class="color-indicator" id="textColorIndicator"></span>
                    </button>
                </div>

                <div class="toolbar-separator"></div>

                <!-- 정렬 버튼 -->
                <div class="toolbar-group">
                    <button class="toolbar-btn align-btn" data-align="left" title="왼쪽 정렬">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="21" y1="10" x2="7" y2="10"></line>
                            <line x1="21" y1="6" x2="3" y2="6"></line>
                            <line x1="21" y1="14" x2="3" y2="14"></line>
                            <line x1="21" y1="18" x2="7" y2="18"></line>
                        </svg>
                    </button>
                    <button class="toolbar-btn align-btn" data-align="center" title="가운데 정렬">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="10" x2="6" y2="10"></line>
                            <line x1="21" y1="6" x2="3" y2="6"></line>
                            <line x1="21" y1="14" x2="3" y2="14"></line>
                            <line x1="18" y1="18" x2="6" y2="18"></line>
                        </svg>
                    </button>
                    <button class="toolbar-btn align-btn" data-align="right" title="오른쪽 정렬">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="10" x2="17" y2="10"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="14" x2="21" y2="14"></line>
                            <line x1="3" y1="18" x2="17" y2="18"></line>
                        </svg>
                    </button>
                    <button class="toolbar-btn align-btn" data-align="justify" title="양쪽 정렬">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="21" y1="10" x2="3" y2="10"></line>
                            <line x1="21" y1="6" x2="3" y2="6"></line>
                            <line x1="21" y1="14" x2="3" y2="14"></line>
                            <line x1="21" y1="18" x2="3" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 색상 팝업 - 별도 위치에 배치 -->
        <div id="colorPopup" class="color-popup">
            <div class="color-popup-header">
                <span id="colorPopupTitle">색상 선택</span>
                <button id="colorPopupClose" aria-label="닫기">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
                </button>
            </div>
            <div class="color-preset-grid">
                <!-- 글자 색상 프리셋 (트렌디 빨·파·녹) -->
                <button class="color-preset-btn text-color-preset" data-color="#FF5A5F" style="background-color: #FF5A5F;" title="빨강"></button>
                <button class="color-preset-btn text-color-preset" data-color="#3B82F6" style="background-color: #3B82F6;" title="파랑"></button>
                <button class="color-preset-btn text-color-preset" data-color="#22C55E" style="background-color: #22C55E;" title="녹색"></button>
                <!-- 사용자 정의 (원형, 클릭하여 직접 선택) -->
                <input type="color" id="customColorPicker" class="custom-color-circle" title="사용자 정의 색 선택">
            </div>
        </div>

        <textarea id="contentInput" placeholder="내용" rows="4"></textarea>
        <div class="editor-buttons">
            <button onclick="saveNode()" class="editor-save-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
                저장
            </button>
        </div>
    </div>
    <div id="folderTree" class="folder-tree"></div>
    <div class="calendar-container">
        <div class="calendar-upper">
            <div class="calendar-header">
                <button onclick="prevMonth()">◀</button>
                <span id="currentMonth"></span>
                <button onclick="nextMonth()">▶</button>
                <button class="calendar-close-btn" onclick="toggleCalendarView()">×</button>
            </div>
            <div class="calendar-grid">
                <div class="weekday-header sunday">일</div>
                <div class="weekday-header">월</div>
                <div class="weekday-header">화</div>
                <div class="weekday-header">수</div>
                <div class="weekday-header">목</div>
                <div class="weekday-header">금</div>
                <div class="weekday-header saturday">토</div>
            </div>
        </div>
        <div class="calendar-notes-section">
            <div class="calendar-notes-header">
                <span class="calendar-notes-title">선택한 날짜의 노트</span>
            </div>
            <div class="calendar-notes-list">
                <div class="calendar-notes-empty">날짜를 선택하세요</div>
            </div>
        </div>
    </div>

    <div class="folder-container">
        <div class="folder-header">
            <span class="folder-view-title" id="folderViewTitle" onclick="editFolderViewTitle()" title="클릭하여 수정">Connect Dots</span>
            <button class="folder-close-btn" onclick="toggleFolderView()" title="닫기">×</button>
        </div>
        <div class="folder-list"></div>
    </div>

    <!-- 로그인 UI 수정 - 새로운 모던 스타일 로그인 모달 -->
    <div id="loginModal" class="login-modal">
        <div class="login-container">
            <div class="login-header">
                <span class="login-tag">My Web Hub</span>
                <div class="login-logo" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#FFD23F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 17 9 11 13 15 21 5"/>
                        <circle cx="3" cy="17" r="1.7" fill="#FFD23F"/><circle cx="9" cy="11" r="1.7" fill="#FFD23F"/>
                        <circle cx="13" cy="15" r="1.7" fill="#FFD23F"/><circle cx="21" cy="5" r="1.7" fill="#FFD23F"/>
                    </svg>
                </div>
                <h1>Connect Dots</h1>
                <p>아이디어를 연결하고 생각을 시각화하세요</p>
            </div>

            <div class="login-form-container">
                <div class="login-tabs">
                    <button class="login-tab active" data-tab="signin">로그인</button>
                    <button class="login-tab" data-tab="signup">회원가입</button>
                </div>

                <form id="signinForm" class="auth-form active">
                    <div class="input-group">
                        <input type="email" id="loginEmail" placeholder="이메일" required>
                        <span class="input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
                        </span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="loginPassword" placeholder="비밀번호" required>
                        <span class="input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                        </span>
                    </div>
                    <button type="submit" class="auth-submit-btn">로그인</button>
                </form>

                <form id="signupForm" class="auth-form">
                    <div class="input-group">
                        <input type="email" id="signupEmail" placeholder="이메일" required>
                        <span class="input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
                        </span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="signupPassword" placeholder="비밀번호 (6자 이상)" required minlength="6">
                        <span class="input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                        </span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="confirmPassword" placeholder="비밀번호 확인" required minlength="6">
                        <span class="input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                        </span>
                    </div>
                    <button type="submit" class="auth-submit-btn">회원가입</button>
                </form>

                <div class="auth-divider">
                    <span>또는</span>
                </div>

                <button class="guest-login-btn" onclick="FirebaseManager.signInAnonymously()">
                    <span class="guest-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
                    </span>
                    게스트로 시작하기
                </button>
            </div>

            <div class="login-footer">
                <p>Connect Dots로 당신의 생각을 자유롭게 연결해보세요</p>
            </div>
        </div>
    </div>

    <!-- 로그인 상태 표시 (우상단) -->
    <div id="userStatusBar" class="user-status-bar" style="display: none;">
        <div class="user-info">
            <span class="user-avatar">👤</span>
            <span id="userDisplayName">사용자</span>
        </div>
        <button id="logoutBtn" class="logout-btn" title="로그아웃">
            <span>로그아웃</span>
        </button>
    </div>

    <!-- 오류 메시지 표시용 -->
    <div id="authErrorMessage" class="auth-error-message" style="display: none;"></div>

    <div class="mobile-calendar-table-container">
        <div class="mobile-table-header">
            <h3>선택된 날짜의 노트</h3>
            <button class="mobile-table-close">×</button>
        </div>
        <div class="mobile-table-content">
            <!-- 동적으로 내용이 채워질 곳 -->
        </div>
    </div>

    <!-- AI 마인드맵 생성 모달 -->
    <div id="aiModal" class="ai-modal">
        <div class="ai-modal-content">
            <div class="ai-modal-header">
                <h2>🤖 AI 마인드맵 생성</h2>
                <button class="ai-modal-close" onclick="closeAIModal()">×</button>
            </div>

            <!-- 사용 안내 -->
            <div class="api-notice">
                <div class="api-notice-icon">ℹ️</div>
                <div class="api-notice-text">
                    <strong>AI 마인드맵 생성 안내</strong>
                    <p>• 로그인한 사용자만 사용 가능</p>
                    <p>• 일일 사용 한도: 50회</p>
                </div>
            </div>

            <div class="ai-input-area">
                <textarea id="aiTextInput" class="ai-text-input"
